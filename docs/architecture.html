<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grandma Ads — Architecture</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px;
    background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #0f172a;
  }
  .wrap {
    max-width: 1500px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
  }
  h1 { margin: 0 0 4px; font-size: 26px; font-weight: 800; color: #0f172a; }
  .subtitle { margin: 0 0 20px; color: #64748b; font-size: 14px; }
  svg { width: 100%; height: auto; display: block; }
  .legend { margin-top: 24px; display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; color: #475569; }
  .legend span { display: inline-flex; align-items: center; gap: 8px; }
  .swatch { width: 28px; height: 3px; border-radius: 2px; }
  .swatch.solid { background: #475569; }
  .swatch.dashed { background: repeating-linear-gradient(90deg, #f59e0b 0 6px, transparent 6px 10px); }
  .swatch.blue { background: repeating-linear-gradient(90deg, #3b82f6 0 6px, transparent 6px 10px); }
  .swatch.green { background: repeating-linear-gradient(90deg, #22c55e 0 6px, transparent 6px 10px); }
  .swatch.orange { background: repeating-linear-gradient(90deg, #f97316 0 6px, transparent 6px 10px); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Grandma Ads — System Architecture</h1>
  <p class="subtitle">Current implementation (solid arrows) + sponsor integration plan (dashed arrows)</p>

<svg viewBox="0 0 1450 1140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#475569"/>

      <path d="M0,0 L0,8 L10,4 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#f97316"/>
    </marker>

      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>

    <linearGradient id="serverBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>

      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>

  <!-- ===== ACTORS ===== -->
  <g>
    <rect x="475" y="20" width="200" height="56" rx="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="575" y="54" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Advertiser</text>

    <rect x="775" y="20" width="240" height="56" rx="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="895" y="54" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Poster / Channel Owner</text>
  </g>

  <!-- ===== FRONTEND ===== -->
  <g>
    <rect x="400" y="120" width="320" height="80" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
    <text x="560" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#155e75">React + Wagmi Web</text>
    <text x="560" y="172" text-anchor="middle" font-size="12" fill="#0e7490">balance · deposit · withdraw · campaigns</text>
    <text x="560" y="190" text-anchor="middle" font-size="12" fill="#0e7490">channel registration · campaign list</text>

    <rect x="780" y="120" width="320" height="80" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
    <text x="940" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#155e75">Telegram Bot</text>
    <text x="940" y="172" text-anchor="middle" font-size="12" fill="#0e7490">long polling · /register_channel · /new_campaign</text>
    <text x="940" y="190" text-anchor="middle" font-size="12" fill="#0e7490">/accept · /counter · /reject · /dev_*</text>
  </g>

  <!-- ===== SERVER CONTAINER ===== -->
  <g>
    <rect x="30" y="240" width="1100" height="640" rx="16" fill="url(#serverBg)" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="50" y="268" font-size="15" font-weight="800" fill="#475569" letter-spacing="1px">SERVER — HEXAGONAL ARCHITECTURE (Express)</text>

    <!-- HTTP LAYER -->
    <rect x="50" y="285" width="1060" height="60" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="70" y="308" font-size="11" font-weight="800" fill="#4338ca" letter-spacing="1.2px">HTTP LAYER</text>
    <text x="70" y="328" font-size="13" fill="#312e81">Express Routes → /users · /me · /balances · /channels · /campaigns · /agent/intake</text>

    <!-- APP LAYER -->
    <text x="50" y="372" font-size="11" font-weight="800" fill="#7c3aed" letter-spacing="1.2px">APPLICATION LAYER</text>

    <rect x="50" y="382" width="520" height="115" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="70" y="408" font-size="15" font-weight="700" fill="#6b21a8">Use Cases</text>
    <text x="70" y="428" font-size="11" fill="#581c87">createAppUseCases() — composition root</text>
    <text x="70" y="447" font-size="11" fill="#581c87">• campaign lifecycle: draft → fund → offer → accept → settle</text>
    <text x="70" y="464" font-size="11" fill="#581c87">• channels, users, dev wallet (mint / deposit / withdraw)</text>
    <text x="70" y="481" font-size="11" fill="#581c87">• post submission &amp; verification triggers</text>

    <rect x="590" y="382" width="520" height="115" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="610" y="408" font-size="15" font-weight="700" fill="#6b21a8">Agent Service</text>
    <text x="610" y="428" font-size="11" fill="#581c87">extractCampaignIntake — regex parse channel / amount / duration</text>
    <text x="610" y="447" font-size="11" fill="#581c87">generatePosterOffer — template offer message</text>
    <text x="610" y="464" font-size="11" fill="#581c87">suggestCounterReply — counter-offer negotiation</text>
    <text x="610" y="481" font-size="11" fill="#581c87">explainVerificationFailure</text>

    <!-- DOMAIN LAYER -->
    <text x="50" y="525" font-size="11" font-weight="800" fill="#b45309" letter-spacing="1.2px">DOMAIN LAYER</text>

    <rect x="50" y="535" width="345" height="115" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="70" y="561" font-size="15" font-weight="700" fill="#854d0e">Campaign FSM</text>
    <text x="70" y="582" font-size="11" fill="#713f12">DRAFT → AWAITING_FUNDS</text>
    <text x="70" y="599" font-size="11" fill="#713f12">→ FUNDED → OFFERED → ACCEPTED</text>
    <text x="70" y="616" font-size="11" fill="#713f12">→ AWAITING_POST → VERIFYING_POST</text>
    <text x="70" y="633" font-size="11" fill="#713f12">→ ACTIVE → COMPLETED / REFUNDED</text>

    <rect x="412" y="535" width="345" height="115" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="432" y="561" font-size="15" font-weight="700" fill="#854d0e">Content Moderation</text>
    <text x="432" y="582" font-size="11" fill="#713f12">SafetyResult { allowed, riskLevel,</text>
    <text x="432" y="599" font-size="11" fill="#713f12">reasons[], suggestedFixes[] }</text>
    <text x="432" y="616" font-size="11" fill="#713f12">drugs · scams · phishing · malware</text>
    <text x="432" y="633" font-size="11" fill="#713f12">hate · adult · deceptive financial</text>

    <rect x="774" y="535" width="336" height="115" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="794" y="561" font-size="15" font-weight="700" fill="#854d0e">Post Verification</text>
    <text x="794" y="582" font-size="11" fill="#713f12">verifyPostSnapshot()</text>
    <text x="794" y="599" font-size="11" fill="#713f12">URL parse · channel match check</text>
    <text x="794" y="616" font-size="11" fill="#713f12">approved text matching (normalized)</text>
    <text x="794" y="633" font-size="11" fill="#713f12">image hash verification</text>

    <!-- ADAPTERS LAYER -->
    <text x="50" y="678" font-size="11" font-weight="800" fill="#047857" letter-spacing="1.2px">ADAPTERS / PORTS</text>

    <rect x="50" y="688" width="345" height="170" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="70" y="714" font-size="15" font-weight="700" fill="#065f46">Persistence</text>
    <text x="70" y="734" font-size="11" font-weight="600" fill="#064e3b">InMemory · MongoDB</text>
    <text x="70" y="754" font-size="11" fill="#064e3b">UserRepository</text>
    <text x="70" y="771" font-size="11" fill="#064e3b">ChannelRepository</text>
    <text x="70" y="788" font-size="11" fill="#064e3b">CampaignRepository</text>
    <text x="70" y="805" font-size="11" fill="#064e3b">DevWalletRepository</text>
    <text x="70" y="822" font-size="11" fill="#064e3b">VerificationCheckRepository</text>
    <text x="70" y="839" font-size="11" fill="#064e3b">OfferMessageRepository</text>

    <rect x="412" y="688" width="345" height="170" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="432" y="714" font-size="15" font-weight="700" fill="#065f46">Blockchain Gateway</text>
    <text x="432" y="734" font-size="11" font-weight="600" fill="#064e3b">viem public + wallet client</text>
    <text x="432" y="754" font-size="11" fill="#064e3b">getBalance(wallet, token)</text>
    <text x="432" y="771" font-size="11" fill="#064e3b">createCampaignFromBalance()</text>
    <text x="432" y="788" font-size="11" fill="#064e3b">startCampaign · completeCampaign</text>
    <text x="432" y="805" font-size="11" fill="#064e3b">refundCampaign</text>
    <text x="432" y="822" font-size="11" fill="#064e3b">DevWallet: mint · approve · deposit</text>
    <text x="432" y="839" font-size="11" fill="#064e3b">withdraw · gas top-up</text>

    <rect x="774" y="688" width="336" height="170" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="794" y="714" font-size="15" font-weight="700" fill="#065f46">Agent Gateway</text>
    <text x="794" y="734" font-size="11" font-weight="600" fill="#064e3b">OpenAI · Deterministic</text>
    <text x="794" y="754" font-size="11" fill="#064e3b">analyzeCampaignRequest()</text>
    <text x="794" y="771" font-size="11" fill="#064e3b">suggestAdCopy()</text>
    <text x="794" y="788" font-size="11" fill="#064e3b">generatePosterOffer()</text>
    <text x="794" y="805" font-size="11" fill="#064e3b">suggestCounterReply()</text>
    <text x="794" y="822" font-size="11" font-style="italic" fill="#047857">Falls back when</text>
    <text x="794" y="839" font-size="11" font-style="italic" fill="#047857">OPENAI_API_KEY missing</text>
  </g>

  <!-- ===== SPONSORS PANEL ===== -->

    <!-- KeeperHub -->
    <rect x="1170" y="305" width="230" height="175" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="1190" y="333" font-size="16" font-weight="800" fill="#1e3a8a">KeeperHub</text>
    <text x="1190" y="354" font-size="11" font-weight="700" fill="#1e40af">Reliable execution layer</text>
    <line x1="1190" y1="362" x2="1380" y2="362" stroke="#93c5fd" stroke-width="1"/>

    <text x="1190" y="418" font-size="11" fill="#1e3a8a">→ refundCampaign()</text>
    <text x="1190" y="445" font-size="10" font-style="italic" fill="#3730a3">Replaces direct viem writes</text>
    <text x="1190" y="461" font-size="10" font-style="italic" fill="#3730a3">for settlement actions</text>

    <!-- ENS -->
    <rect x="1170" y="500" width="230" height="170" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="1190" y="528" font-size="16" font-weight="800" fill="#14532d">ENS</text>
    <text x="1190" y="549" font-size="11" font-weight="700" fill="#166534">Identity layer</text>
    <line x1="1190" y1="557" x2="1380" y2="557" stroke="#86efac" stroke-width="1"/>
    <text x="1190" y="577" font-size="11" fill="#14532d">→ advertiser.eth</text>
    <text x="1190" y="595" font-size="11" fill="#14532d">→ poster.eth</text>
    <text x="1190" y="613" font-size="11" fill="#14532d">→ admein-agent.eth</text>
    <text x="1190" y="640" font-size="10" font-style="italic" fill="#15803d">Resolved in bot messages,</text>
    <text x="1190" y="656" font-size="10" font-style="italic" fill="#15803d">web UI, + text records</text>

    <!-- 0G -->
    <rect x="1170" y="690" width="230" height="170" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="1190" y="718" font-size="16" font-weight="800" fill="#7c2d12">0G</text>
    <text x="1190" y="739" font-size="11" font-weight="700" fill="#9a3412">Decentralized AI + Storage</text>
    <line x1="1190" y1="747" x2="1380" y2="747" stroke="#fdba74" stroke-width="1"/>
    <text x="1190" y="767" font-size="11" fill="#7c2d12">→ Compute: safety inference</text>
    <text x="1190" y="785" font-size="11" fill="#7c2d12">→ Storage: proof bundles</text>
    <text x="1190" y="803" font-size="11" fill="#7c2d12">    (text/image hashes,</text>
    <text x="1190" y="820" font-size="11" fill="#7c2d12">     verification logs)</text>
    <text x="1190" y="847" font-size="10" font-style="italic" fill="#c2410c">Optional — time permitting</text>
  </g>

  <!-- ===== INFRASTRUCTURE ROW ===== -->
  <g>

    <rect x="610" y="930" width="240" height="120" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
